# This workflow will build and publish a Python package to PyPI using uv
# For more information see: https://docs.astral.sh/uv/guides/publish/

name: Publish to PyPI

on:
  push:
    branches:
      - master
jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10' , '3.14' ]

    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Test with pytest
        run: |
          uv run --python ${{ matrix.python-version }} --extra test --no-dev pytest aerosandbox

  deploy:

    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish
